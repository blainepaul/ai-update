name: Aggiorna Notizie AI

on:
  schedule:
    # Mattina (CEST = UTC+2; in inverno CET = UTC+1, aggiungere 1h)
    - cron: '0 6 * * *'    # 08:00 CEST — tentativo principale
    - cron: '30 6 * * *'   # 08:30 CEST — secondo tentativo
    - cron: '0 7 * * *'    # 09:00 CEST — terzo tentativo
    # Pomeriggio
    - cron: '30 14 * * *'  # 16:30 CEST — tentativo principale pomeridiano
    - cron: '0 15 * * *'   # 17:00 CEST — secondo tentativo
    - cron: '30 15 * * *'  # 17:30 CEST — terzo tentativo
  workflow_dispatch:       # permette anche il lancio manuale dalla pagina GitHub Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui aggregatore
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          REDDIT_CLIENT_ID:      ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:  ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python main.py

      - name: Salva store e pubblica sito
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@users.noreply.github.com"
          git add cache/articles.json cache/last_notified.txt cache/last_run.txt cache/traction_history.json docs/index.html
          git diff --staged --quiet || git commit -m "news: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
